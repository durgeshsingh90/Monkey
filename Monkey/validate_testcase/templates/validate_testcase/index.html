<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Validate Testcase</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100%;
    }

    .left,
    .right {
      flex: 1;
      padding: 20px;
      box-sizing: border-box;
    }

    .left {
      background-color: #f0f8ff;
      border-right: 2px solid #ccc;
    }

    .right {
      background-color: #fffaf0;
    }

    h2 {
      text-align: center;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    input[type="file"] {
      width: 80%;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <h2>Upload Excel File</h2>
      <form action="{% url 'upload_excel' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="excel_file" accept=".xlsx,.xls" required>
        <button type="submit">Upload Excel</button>
      </form>
    </div>

    <div class="right">
      <h2>Upload Log File</h2>
      <form action="{% url 'upload_logs' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="log_file" accept=".txt,.log,.html,.xml" required>
        <button type="submit">Upload Log</button>
      </form>
    </div>
  </div>
</body>
</html>
